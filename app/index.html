<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP CD Flow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #0f0f0f;
    --surface:   #161616;
    --surface2:  #1e1e1e;
    --border:    #2a2a2a;
    --muted:     #5a5a5a;
    --body:      #b8b8b8;
    --heading:   #e8e8e8;

    /* MVP palette: optimistic — green for change, blue for benefit */
    --accent:       #10b981;   /* primary accent (emerald) */
    --accent-glow:  rgba(16,185,129,0.45);
    --green:        #10b981;
    --green-bg:     rgba(16,185,129,0.10);
    --green-border: rgba(16,185,129,0.25);
    --blue:         #3b82f6;
    --blue-bg:      rgba(59,130,246,0.10);
    --blue-border:  rgba(59,130,246,0.25);

    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--body);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── TOP BAR ─────────────────────────────────────────────── */
  .topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-title {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--heading);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity: 0.4; }
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .version-banner {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
  }
  .version-banner span { color: var(--body); }

  .nav-links {
    display: flex;
    gap: 4px;
  }
  .nav-link {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .nav-link:hover { color: var(--body); border-color: var(--border); }
  .nav-link.active {
    color: var(--accent);
    border-color: var(--green-border);
    background: var(--green-bg);
  }
  .nav-gh { display: inline-flex; align-items: center; padding: 4px 6px; }
  .nav-gh svg { display: block; }

  /* ── LAYOUT ──────────────────────────────────────────────── */
  .layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 48px);
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── DIAGRAM PANE ────────────────────────────────────────── */
  .diagram-pane {
    flex: 0 0 60%;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  .diagram-pane::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(16,185,129,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  #mermaid-container {
    width: 100%;
    max-height: 100%;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #mermaid-container svg {
    max-width: 100%;
    max-height: calc(100vh - 160px);
  }

  /* ── INFO PANEL ──────────────────────────────────────────── */
  .info-panel {
    flex: 0 0 40%;
    display: flex;
    flex-direction: column;
    padding: 28px 28px 20px;
    overflow-y: auto;
    gap: 20px;
  }

  .step-counter {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .step-counter strong {
    color: var(--accent);
    font-weight: 600;
  }

  .step-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .step-title {
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 600;
    color: var(--heading);
    line-height: 1.3;
    transition: opacity 0.2s;
  }

  .new-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 3px 7px;
    border-radius: 2px;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .new-badge.hidden { display: none; }

  .step-description {
    font-size: 14px;
    line-height: 1.7;
    color: var(--body);
    transition: opacity 0.2s;
  }

  .callouts {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .callouts-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .callout {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid transparent;
    line-height: 1.5;
    font-size: 13px;
    transition: transform 0.15s, opacity 0.15s;
    animation: callout-in 0.25s ease backwards;
  }

  @keyframes callout-in {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .callout.change {
    background: var(--green-bg);
    border-color: var(--green-border);
    color: #6ee7b7;
  }
  .callout.benefit {
    background: var(--blue-bg);
    border-color: var(--blue-border);
    color: #93c5fd;
  }

  .callout-chip {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .callout.change .callout-chip {
    background: rgba(16,185,129,0.25);
    color: var(--green);
  }
  .callout.benefit .callout-chip {
    background: rgba(59,130,246,0.25);
    color: var(--blue);
  }

  /* ── ROLLBACK FORM MOCK ──────────────────────────────────── */
  .rollback-mock {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    animation: callout-in 0.3s ease backwards;
    animation-delay: 80ms;
  }
  .rollback-mock-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rollback-mock-icon {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-size: 9px;
    font-family: var(--font-mono);
    font-weight: 600;
  }
  .rollback-mock-title {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--heading);
    font-weight: 500;
    flex: 1;
  }
  .rollback-mock-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 2px;
  }
  .rollback-mock-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .rollback-mock-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .rollback-mock-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .rollback-mock-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 7px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--body);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: default;
  }
  .rollback-mock-select::after {
    content: '▾';
    color: var(--muted);
    font-size: 10px;
    margin-left: 8px;
  }
  .rollback-mock-btn {
    align-self: flex-start;
    background: var(--accent);
    color: #04110b;
    border: none;
    padding: 7px 16px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 2px;
    box-shadow: 0 0 0 1px rgba(16,185,129,0.3), 0 2px 8px rgba(16,185,129,0.2);
  }
  .rollback-mock-btn:hover {
    filter: brightness(1.08);
  }

  /* ── BOTTOM CONTROLS ─────────────────────────────────────── */
  .controls {
    height: 72px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 24px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .progress-bar-wrap {
    width: 320px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 7px 20px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--body);
    cursor: pointer;
    transition: all 0.15s;
    outline: none;
  }
  .btn:hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--muted);
    color: var(--heading);
  }
  .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .step-indicator {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 50px;
    text-align: center;
  }

  /* ── MERMAID OVERRIDES ───────────────────────────────────── */
  #mermaid-container .node {
    cursor: pointer;
  }

  /* baseline node — calmer steel-blue/grey, "we're improving" */
  #mermaid-container .node rect,
  #mermaid-container .node circle,
  #mermaid-container .node polygon {
    fill: #1a1f24 !important;
    stroke: #3a4550 !important;
    stroke-width: 1.5px !important;
    transition: filter 0.15s, fill 0.2s, stroke 0.2s;
  }

  /* "new" nodes — subtle green tint to signal automation */
  #mermaid-container .node.new rect,
  #mermaid-container .node.new circle,
  #mermaid-container .node.new polygon {
    fill: rgba(16,185,129,0.08) !important;
    stroke: rgba(16,185,129,0.5) !important;
    stroke-width: 1.5px !important;
  }

  /* active node — full emerald glow */
  #mermaid-container .node.active rect,
  #mermaid-container .node.active circle,
  #mermaid-container .node.active polygon {
    fill: rgba(16,185,129,0.18) !important;
    stroke: var(--accent) !important;
    stroke-width: 2px !important;
    filter: drop-shadow(0 0 10px var(--accent-glow));
  }

  #mermaid-container .nodeLabel,
  #mermaid-container .label {
    color: #b8b8b8 !important;
    font-family: var(--font-mono) !important;
    font-size: 12px !important;
  }

  #mermaid-container .node.new .nodeLabel,
  #mermaid-container .node.new .label {
    color: #a7e6c8 !important;
  }

  #mermaid-container .node.active .nodeLabel,
  #mermaid-container .node.active .label {
    color: #d1fae5 !important;
    font-weight: 500 !important;
  }

  #mermaid-container .edgePath .path {
    stroke: #3a4550 !important;
    stroke-width: 1.5px !important;
  }

  #mermaid-container .arrowheadPath {
    fill: #3a4550 !important;
    stroke: none !important;
  }

  /* hotfix dotted edge gets a slightly different tone */
  #mermaid-container .edgePath.hotfix .path {
    stroke: #d97706 !important;
    stroke-dasharray: 5 4 !important;
  }

  /* ── RESPONSIVE ──────────────────────────────────────────── */
  @media (max-width: 768px) {
    html, body { overflow: auto; }

    .layout { height: auto; }
    .main { flex-direction: column; }

    .diagram-pane {
      flex: none;
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
      height: 280px;
    }

    #mermaid-container svg {
      max-height: 250px;
    }

    .info-panel {
      flex: none;
      width: 100%;
    }

    .controls { height: auto; padding: 12px; }
    .progress-bar-wrap { width: 240px; }

    .topbar .version-banner { display: none; }
    .nav-link { padding: 4px 7px; font-size: 10px; }

    .step-title { font-size: 19px; }
  }
</style>
</head>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="status-dot"></div>
    <span class="topbar-title">MVP CD Flow</span>
  </div>
  <div class="topbar-right">
    <div class="version-banner">
      <span>sha:</span><span id="sha-display">—</span>
      <span>env:</span><span>production</span>
      <span>deployed:</span><span id="ts-display">—</span>
    </div>
    <nav class="nav-links" aria-label="Demo navigation">

<!-- LAYOUT -->
<div class="layout">
  <div class="main">

    <!-- DIAGRAM -->
    <div class="diagram-pane" aria-label="Pipeline diagram">
      <div id="mermaid-container"></div>
    </div>

    <!-- INFO PANEL -->
    <aside class="info-panel" aria-live="polite" aria-label="Step details">
      <div>
        <div class="step-counter">Step <strong id="step-num">1</strong> / <span id="step-total">12</span></div>
        <div class="step-title-row">
          <h2 class="step-title" id="step-title">Loading…</h2>
          <span class="new-badge hidden" id="new-badge">NEW</span>
        </div>
      </div>
      <p class="step-description" id="step-desc"></p>
      <div class="callouts" id="callouts-container">
        <div class="callouts-label">What changed &amp; why it helps</div>
        <div id="callouts-list"></div>
        <div id="rollback-mock-slot"></div>
      </div>
    </aside>

  </div>

  <!-- CONTROLS -->
  <footer class="controls">
    <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="progress-bar" aria-valuenow="11">
      <div class="progress-bar-fill" id="progress-fill" style="width:11%"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-prev" aria-label="Previous step">← Prev</button>
      <span class="step-indicator" id="step-indicator">1 / 12</span>
      <button class="btn" id="btn-next" aria-label="Next step">Next →</button>
    </div>
  </footer>
</div>

<script>

// ── STATE ───────────────────────────────────────────────────────────────────
// To open the demo on the rollback step (step 8) for screenshot/review, set
// INITIAL_STEP = 7. Default is 0 (step 1).
const INITIAL_STEP = 0;
let currentStep = INITIAL_STEP;
const steps = STEPS_DATA.steps;
const total = steps.length;

// ── VERSION BANNER ──────────────────────────────────────────────────────────
document.getElementById('sha-display').textContent = 'b7e2a40';
const pad = n => String(n).padStart(2, '0');
const aestParts = new Intl.DateTimeFormat('en-AU', {
  timeZone: 'Australia/Brisbane',
  year: 'numeric', month: '2-digit', day: '2-digit',
  hour: '2-digit', minute: '2-digit', hour12: false

document.getElementById('ts-display').textContent =
  `${ap.year}-${ap.month}-${ap.day} ${ap.hour}:${ap.minute} AEST`;

// ── ROLLBACK MOCK ───────────────────────────────────────────────────────────

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderStep(idx) {
  const step = steps[idx];

  // Counter + title + desc
  document.getElementById('step-num').textContent = idx + 1;
  document.getElementById('step-total').textContent = total;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-desc').textContent = step.description;
  document.getElementById('step-indicator').textContent = `${idx + 1} / ${total}`;

  // NEW badge
  const badge = document.getElementById('new-badge');
  if (step.isNew) badge.classList.remove('hidden');
  else badge.classList.add('hidden');

  // Progress
  const pct = Math.round(((idx + 1) / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-bar').setAttribute('aria-valuenow', pct);

  // Callouts
  const list = document.getElementById('callouts-list');
  list.innerHTML = '';
  step.callouts.forEach((c, i) => {
    const chip = STEPS_DATA.callout_types[c.type];
    const div = document.createElement('div');
    div.className = `callout ${c.type}`;
    div.style.animationDelay = `${i * 60}ms`;
    div.innerHTML = `<span class="callout-chip">${chip.label}</span><span></span>`;
    div.querySelector('span:last-child').textContent = c.text;
    list.appendChild(div);
  });

  // Rollback mock (only on step 8)
  const slot = document.getElementById('rollback-mock-slot');
  slot.innerHTML = step.showRollbackMock ? buildRollbackMock() : '';

  // Buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === total - 1;

  // Highlight active node in diagram
  highlightNode(step.nodeId);
}

// ── NODE HIGHLIGHT ──────────────────────────────────────────────────────────
function highlightNode(activeNodeId) {
  const svg = document.querySelector('#mermaid-container svg');
  if (!svg) return;

  // Reset all nodes
  const nodes = svg.querySelectorAll('.node');
  nodes.forEach(node => {
    node.classList.remove('active');
  });

  // Find the node by its id attribute (mermaid uses flowchart-{nodeId}-{n})
  const activeNode = svg.querySelector(`[id*="flowchart-${activeNodeId}-"], #flowchart-${activeNodeId}`);
  if (activeNode) {
    activeNode.classList.add('active');
  }
}

// ── MERMAID INIT ────────────────────────────────────────────────────────────
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  themeVariables: {
    background: '#0f0f0f',
    primaryColor: '#1a1f24',
    primaryBorderColor: '#3a4550',
    primaryTextColor: '#b8b8b8',
    lineColor: '#3a4550',
    edgeLabelBackground: '#0f0f0f',
    fontFamily: 'IBM Plex Mono, monospace',
    fontSize: '12px',
  },
  flowchart: {
    curve: 'monotoneY',
    useMaxWidth: true,
    htmlLabels: true,
  }
});

// ── DIAGRAM SOURCE ──────────────────────────────────────────────────────────
// Defined in JS (not HTML) to avoid any whitespace / entity weirdness.
// Lines must start at column 0 — Mermaid 10 is picky about leading indent.
const DIAGRAM_SRC = [
  'flowchart TD',
  '  A["PR merged - CI green"]',
  '  B["Auto-release tag"]:::new',
  '  T["Deploy test env"]:::new',
  '  U["E2E smoke on test"]:::new',
  '  V["test-passed tag"]:::new',
  '  C["Deploy staging"]',
  '  D["E2E smoke / Soak >=30 min"]:::new',
  '  E["Cron promote prod"]:::new',
  '  F["Deploy prod"]',
  '  G["Live"]',
  '  H["Self-service rollback"]:::new',
  '  X["Slack notify"]:::new',
  '  A --> B',
  '  B --> T',
  '  T --> U',
  '  U --> V',
  '  V --> C',
  '  C --> D',
  '  D --> E',
  '  E --> F',
  '  F --> G',

  '  G -. dispatch .-> H',
  '  H -. swap .-> F',
  '  B -. fail .-> X',
  '  C -. fail .-> X',
  '  E -. fail .-> X',
  '  E -. success .-> X',
  '  classDef new fill:#0d2820,stroke:#10b981,stroke-width:1.5px,color:#a7e6c8'
].join('\n');

async function initDiagram() {
  try {
    const { svg } = await mermaid.render('pipeline-svg', DIAGRAM_SRC);
    document.getElementById('mermaid-container').innerHTML = svg;

    // After render, apply initial highlight and bind click handlers
    setTimeout(() => {
      renderStep(currentStep);
      bindNodeClicks();
    }, 50);
  } catch(e) {
    console.error('Mermaid render error:', e);
    document.getElementById('mermaid-container').innerHTML =
      '<div style="color:#888;font-family:monospace;font-size:12px;padding:20px;text-align:center;">' +
      'Diagram failed to render.<br/><br/>' +
      '<span style="color:#666;font-size:11px;">' +
      ((e && e.message) ? e.message.replace(/</g,'&lt;') : 'unknown error') +
      '</span></div>';
    renderStep(currentStep);
  }
}

// ── NODE CLICK BINDING ────────────────────────────────────────────────────────
function bindNodeClicks() {
  const svg = document.querySelector('#mermaid-container svg');
  if (!svg) return;

  // Build a map of nodeId -> step index
  const nodeToStep = {};
  steps.forEach((s, i) => { nodeToStep[s.nodeId] = i; });

  svg.querySelectorAll('.node').forEach(node => {
    const matchedId = Object.keys(nodeToStep).find(id =>
      (node.id && node.id.includes('flowchart-' + id + '-')) || node.id === 'flowchart-' + id
    );
    if (matchedId === undefined) return;

    node.style.cursor = 'pointer';

    // Hover shimmer
    node.addEventListener('mouseenter', () => {
      if (steps[currentStep].nodeId === matchedId) return;
      const shape = node.querySelector('rect, circle, polygon');
      if (shape) shape.style.filter = 'brightness(1.4)';
    });
    node.addEventListener('mouseleave', () => {
      if (steps[currentStep].nodeId === matchedId) return;
      const shape = node.querySelector('rect, circle, polygon');
      if (shape) shape.style.filter = '';
    });

    node.addEventListener('click', () => {
      const idx = nodeToStep[matchedId];
      if (idx !== undefined) goTo(idx);
    });
  });
}

// ── NAVIGATION ──────────────────────────────────────────────────────────────
function goTo(idx) {
  if (idx < 0 || idx >= total) return;
  currentStep = idx;
  renderStep(currentStep);
}

document.getElementById('btn-prev').addEventListener('click', () => goTo(currentStep - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(currentStep + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentStep + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goTo(currentStep - 1); }
});

// ── BOOT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', initDiagram);
</script>
