name: Auto-release on green CI

# MVP CHANGE vs current:
# Tag is created automatically when CI succeeds on `main`. No human click.
# Benefit: removes the "navigate to Actions, fill form, click" step entirely.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.new }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # PAT used so the tag push triggers deploy-staging.yml
          # (default GITHUB_TOKEN-pushed tags don't trigger workflows).
          token: ${{ secrets.CICD_PAT }}

      - name: Compute and push tag
        id: tag
        run: |
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -1)"
          LAST="${LAST_TAG:-v0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
          PATCH=$((PATCH+1))
          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          SHA="$(git rev-parse --short HEAD)"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$NEW"
          git push origin "$NEW"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tagged $NEW @ $SHA"
