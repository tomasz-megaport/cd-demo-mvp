name: Pipeline

# MVP pipeline as a single DAG so one GH Actions run page shows the whole
# graph: ci → release_tag → deploy_preprod → e2e_preprod → tag_preprod_passed.
#
# After this point, the `promote-sandbox-prod` workflow takes over — its 8h
# cron picks the newest `pre-prod-passed/<sha>` tag and deploys it to
# sandbox + prod in parallel.
#
# Tags still emitted (`v*.*.*`, `pre-prod-passed/<sha>`) so external systems
# (Sentry releases, audit logs, monitoring) can key off them as immutable
# artifact identifiers — they outlive 90-day workflow run retention.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Validate version.json
        run: node -e "JSON.parse(require('fs').readFileSync('app/version.json','utf8'))"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test
        run: pnpm test:smoke

  release_tag:
    needs: ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: tag
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -1)"
          LAST="${LAST_TAG:-v0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
          PATCH=$((PATCH + 1))
          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          SHA="$(git rev-parse --short HEAD)"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$NEW"
          git push origin "$NEW"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Released $NEW @ $SHA"

  deploy_preprod:
    needs: release_tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release_tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to pre-prod
        env:
          GITHUB_SHA: ${{ needs.release_tag.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh pre-prod

  e2e_preprod:
    needs: [release_tag, deploy_preprod]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E + smoke on pre-prod env
        run: pnpm exec playwright test

  tag_preprod_passed:
    needs: [release_tag, e2e_preprod]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag pre-prod-passed
        env:
          SHA: ${{ needs.release_tag.outputs.sha }}
        run: |
          TAG="pre-prod-passed/$SHA"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG — eligible for sandbox+prod cron promotion"
