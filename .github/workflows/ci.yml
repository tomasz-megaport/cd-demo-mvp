name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate version.json
        run: node -e "JSON.parse(require('fs').readFileSync('app/version.json','utf8'))"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test
        run: pnpm test:smoke
