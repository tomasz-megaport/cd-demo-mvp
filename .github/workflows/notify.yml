name: Slack notify

# MVP CHANGE vs current:
# Authors no longer have to remember to check Actions tab. Slack pings the
# release channel when CI, deploy, promote, or rollback fails.
# Also posts a :rocket: confirmation when prod promotion succeeds.

on:
  workflow_run:
    workflows: ['Pipeline', 'Promote to sandbox+prod', 'Rollback']
    types: [completed]

jobs:
  notify-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          WORKFLOW: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo 'SLACK_WEBHOOK secret not set; skipping notify'
            exit 0
          fi
          PAYLOAD=$(cat <<JSON
          {
            "text": ":rotating_light: *${WORKFLOW}* failed on \`${BRANCH}\` (${SHA:0:7})",
            "blocks": [
              { "type": "section", "text": { "type": "mrkdwn", "text": ":rotating_light: *${WORKFLOW}* failed on \`${BRANCH}\` (\`${SHA:0:7}\`)" }},
              { "type": "section", "text": { "type": "mrkdwn", "text": "<${URL}|View run logs>" }}
            ]
          }
          JSON
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  notify-prod-success:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Promote to sandbox+prod'
    runs-on: ubuntu-latest
    steps:
      - name: Post prod success to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo 'SLACK_WEBHOOK secret not set; skipping notify'
            exit 0
          fi
          PAYLOAD=$(cat <<JSON
          {
            "text": ":rocket: *Sandbox+prod promotion succeeded* (\`${SHA:0:7}\`)",
            "blocks": [
              { "type": "section", "text": { "type": "mrkdwn", "text": ":rocket: *Sandbox+prod promotion succeeded* (\`${SHA:0:7}\`)" }},
              { "type": "section", "text": { "type": "mrkdwn", "text": "<${URL}|View run>" }}
            ]
          }
          JSON
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
